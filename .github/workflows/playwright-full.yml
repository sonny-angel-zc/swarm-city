name: playwright-full

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  full-playwright:
    name: Full Playwright Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Next.js app
        run: npm run build

      - name: Start Next.js app
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid

      - name: Wait for app readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              echo "App is ready."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time."
          tail -n 200 /tmp/next-start.log || true
          exit 1

      - name: Run full Playwright suite
        env:
          CI: "1"
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          SMOKE_HOST: "127.0.0.1"
          SMOKE_PORT: "3000"
        run: npx playwright test

      - name: Stop Next.js app
        if: always()
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill "$(cat /tmp/next-start.pid)" || true
          fi

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-artifacts
          path: |
            playwright-report/
            test-results/
            /tmp/next-start.log
          if-no-files-found: ignore
